<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sand Tray</title>

<style>
:root{
  --bg:#f5f5f5;
  --border:#d8d8d8;
  --shadow:0 8px 24px rgba(0,0,0,.08);
  --handle:#ffffff;
  --handleBorder:#bdbdbd;
  --handleText:#333;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:var(--bg);
  height:100vh;
  overflow:hidden;
}
.app{display:flex; height:100vh;}

/* LEFT — TRAY */
.trayWrap{ flex:3; position:relative; height:100vh; }
.tray{
  width:100%;
  height:100vh;
  position:relative;
  overflow:hidden;
  background-image:url("https://static.wixstatic.com/media/b668a8_f10b4ce8cde646ef82378815e2e6178d~mv2.png");
  background-position:center;
  background-repeat:no-repeat;
  background-size:contain;
}

/* MINIATURES (placed) */
.placed{
  position:absolute;
  left:0; top:0;
  width:140px;

  --rot: 0deg;
  --sx: 1;
  --sy: 1;

  transform: translate(-50%,-50%) rotate(var(--rot)) scale(var(--sx), var(--sy));
  transform-origin: 50% 50%;
  user-select:none;
  touch-action:none;
}
.placed img{
  width:100%;
  pointer-events:none;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.18));
}
.placed.selected{
  outline:3px solid rgba(43,108,176,.6);
  outline-offset:4px;
  border-radius:8px;
}

/* Handles */
.handle{
  display:none;
  position:absolute;
  width:30px;
  height:30px;
  background:var(--handle);
  border:2px solid var(--handleBorder);
  border-radius:10px;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
  color:var(--handleText);
  font-weight:800;
  font-size:16px;
  line-height:1;
  align-items:center;
  justify-content:center;
  z-index:3;
}
.placed.selected .handle{ display:flex; }

.rotateHandle{
  left:50%;
  top:-44px;
  transform:translateX(-50%);
  cursor:grab;
  border-radius:999px;
}
.rotateHandle:active{ cursor:grabbing; }

.rotateLine{
  position:absolute;
  left:50%;
  top:-16px;
  transform:translateX(-50%);
  width:3px;
  height:16px;
  background:#bdbdbd;
  display:none;
  z-index:2;
}
.placed.selected .rotateLine{ display:block; }

/* resize bottom-right, flip bottom-left (prevents “reverse” collisions) */
.resizeHandle{ right:-14px; bottom:-14px; cursor:nwse-resize; border-radius:10px; }
.flipHandle{ left:-14px; bottom:-14px; cursor:pointer; border-radius:10px; }

/* RIGHT — LIBRARY */
.library{
  flex:1;
  background:#fff;
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  min-width:260px;
}
.libHeader{ padding:12px; border-bottom:1px solid var(--border); }
.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}
.tab{
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  background:#fff;
}
.tab.active{
  border-color:#2b6cb0;
  box-shadow:0 0 0 3px rgba(43,108,176,.15);
}

/* thumbs */
.thumbGrid{
  padding:10px;
  overflow:auto;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
}
.thumb{
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  background:#fff;
}
.thumb img{
  width:100%;
  height:64px;
  object-fit:contain;
  pointer-events:none;
  display:block;
}
.thumb .ph{
  width:100%;
  height:64px;
  border-radius:8px;
  background:linear-gradient(90deg, #f2f2f2, #e9e9e9, #f2f2f2);
  background-size:200% 100%;
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer{
  0%{ background-position: 200% 0; }
  100%{ background-position: -200% 0; }
}

/* CONTROLS */
.controls{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.95);
  padding:10px;
  border-radius:8px;
  box-shadow:var(--shadow);
  z-index:50;
}
.controls button{
  margin:4px;
  padding:8px 10px;
  border-radius:6px;
  border:1px solid var(--border);
  cursor:pointer;
}
.controls button:disabled{opacity:.5;}
</style>
</head>

<body>
<div class="app">

  <div class="trayWrap">
    <div id="tray" class="tray"></div>

    <div class="controls">
      <button id="frontBtn" disabled>Bring to Front</button>
      <button id="backBtn" disabled>Send to Back</button>
      <button id="deleteBtn" disabled>Delete</button>
      <button id="clearBtn">Clear</button>
      <button id="exportBtn">SAVE TRAY IMAGE</button>
    </div>
  </div>

  <aside class="library">
    <div class="libHeader">
      <strong>Miniatures</strong>
      <div class="tabs" id="tabs"></div>
    </div>
    <div id="thumbGrid" class="thumbGrid"></div>
  </aside>

</div>

/* =========================
   ELEMENTS + STATE
========================= */
const tray = document.getElementById("tray");
const thumbGrid = document.getElementById("thumbGrid");
const tabsEl = document.getElementById("tabs");

const frontBtn = document.getElementById("frontBtn");
const backBtn  = document.getElementById("backBtn");
const deleteBtn = document.getElementById("deleteBtn");
const clearBtn = document.getElementById("clearBtn");
const exportBtn = document.getElementById("exportBtn");

let selected = null;
let zCounter = 10;
let activeCategory = CATEGORIES[0];

/* =========================
   SELECTION + DELETE KEY
========================= */
function setButtons(state){
  frontBtn.disabled = !state;
  backBtn.disabled  = !state;
  deleteBtn.disabled = !state;
}
function deselect(){
  if (selected) selected.classList.remove("selected");
  selected = null;
  setButtons(false);
}
function select(el){
  if (selected && selected !== el) selected.classList.remove("selected");
  selected = el;
  el.classList.add("selected");
  setButtons(true);
}
function deleteSelected(){
  if (selected){
    selected.remove();
    deselect();
  }
}
window.addEventListener("keydown", (e) => {
  if (e.key === "Delete" || e.key === "Backspace"){
    e.preventDefault();
    deleteSelected();
  }
});

/* =========================
   TRANSFORM HELPERS
========================= */
function applyTransformVars(el){
  const rot   = parseFloat(el.dataset.rot || "0");
  const scale = parseFloat(el.dataset.scale || "1");
  const flipX = parseInt(el.dataset.flipX || "1", 10);

  el.style.setProperty("--rot", rot + "deg");
  el.style.setProperty("--sx", (flipX * scale).toString());
  el.style.setProperty("--sy", scale.toString());
}
function angleDeg(dx, dy){ return Math.atan2(dy, dx) * 180 / Math.PI; }
function normalizeDeg(deg){
  let d = ((deg % 360) + 360) % 360;
  if (d > 180) d -= 360;
  return Math.round(d);
}

/* =========================
   PLACE
   - Only “People” starts smaller
   - Lower minScale so minis can get REALLY small
========================= */
function initialScaleForCategory(cat){
  return (cat === "People") ? 0.6 : 1.0;
}
function place(m, x=null, y=null){
  const rect = tray.getBoundingClientRect();
  if (x === null) x = rect.width / 2;
  if (y === null) y = rect.height / 2;

  const wrap = document.createElement("div");
  wrap.className = "placed";
  wrap.style.left = x + "px";
  wrap.style.top  = y + "px";
  wrap.style.zIndex = (++zCounter);

  wrap.dataset.rot = "0";
  wrap.dataset.scale = String(initialScaleForCategory(m.category));
  wrap.dataset.flipX = "1";
  wrap.dataset.minScale = "0.02";   // allow very small
  wrap.dataset.maxScale = "3";

  const img = document.createElement("img");
  img.src = m.url;
  img.alt = m.name;

  const rotateLine = document.createElement("div");
  rotateLine.className = "rotateLine";

  const rotateHandle = document.createElement("div");
  rotateHandle.className = "handle rotateHandle";
  rotateHandle.title = "Rotate";
  rotateHandle.innerHTML = "<span>↻</span>";

  const resizeHandle = document.createElement("div");
  resizeHandle.className = "handle resizeHandle";
  resizeHandle.title = "Resize";
  resizeHandle.innerHTML = "<span>↔︎</span>";

  const flipHandle = document.createElement("div");
  flipHandle.className = "handle flipHandle";
  flipHandle.title = "Flip";
  flipHandle.innerHTML = "<span>⇋</span>";

  wrap.appendChild(img);
  wrap.appendChild(rotateLine);
  wrap.appendChild(rotateHandle);
  wrap.appendChild(resizeHandle);
  wrap.appendChild(flipHandle);
  tray.appendChild(wrap);

  applyTransformVars(wrap);

  wrap.addEventListener("click", (e) => { e.stopPropagation(); select(wrap); });
  wrap.addEventListener("pointerdown", (e) => move(e, wrap));
  rotateHandle.addEventListener("pointerdown", (e) => rotate(e, wrap));
  resizeHandle.addEventListener("pointerdown", (e) => resize(e, wrap));
  flipHandle.addEventListener("click", (e) => { e.stopPropagation(); flip(wrap); });

  select(wrap);
}

/* Move */
function move(e, el){
  if (e.target.closest(".rotateHandle") || e.target.closest(".resizeHandle") || e.target.closest(".flipHandle")) return;
  e.stopPropagation();
  select(el);

  const rect = tray.getBoundingClientRect();
  const startLeft = parseFloat(el.style.left);
  const startTop  = parseFloat(el.style.top);
  const startX = e.clientX - rect.left;
  const startY = e.clientY - rect.top;

  function onmove(ev){
    el.style.left = startLeft + (ev.clientX - rect.left - startX) + "px";
    el.style.top  = startTop  + (ev.clientY - rect.top  - startY) + "px";
  }
  window.addEventListener("pointermove", onmove);
  window.addEventListener("pointerup", () => window.removeEventListener("pointermove", onmove), { once:true });
}

/* Rotate */
function rotate(e, el){
  e.preventDefault();
  e.stopPropagation();
  select(el);

  const trayRect = tray.getBoundingClientRect();
  const cx = parseFloat(el.style.left);
  const cy = parseFloat(el.style.top);

  const startRot = parseFloat(el.dataset.rot || "0");
  const startAngle = angleDeg(
    (e.clientX - trayRect.left) - cx,
    (e.clientY - trayRect.top)  - cy
  );

  function onmove(ev){
    const currentAngle = angleDeg(
      (ev.clientX - trayRect.left) - cx,
      (ev.clientY - trayRect.top)  - cy
    );
    const delta = currentAngle - startAngle;
    const newRot = normalizeDeg(startRot + delta);

    el.dataset.rot = String(newRot);
    applyTransformVars(el);
  }
  window.addEventListener("pointermove", onmove);
  window.addEventListener("pointerup", () => window.removeEventListener("pointermove", onmove), { once:true });
}

/* Resize (no “reverse”; just scales with clamp) */
function resize(e, el){
  e.preventDefault();
  e.stopPropagation();
  select(el);

  const startScale = parseFloat(el.dataset.scale || "1");
  const minScale = parseFloat(el.dataset.minScale || "0.02");
  const maxScale = parseFloat(el.dataset.maxScale || "3");

  const startX = e.clientX;
  const startY = e.clientY;

  function onmove(ev){
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;

    // smoother: use diagonal drag; up/left shrinks, down/right grows
    const delta = (dx + dy) / 320;
    let newScale = startScale + delta;
    newScale = Math.max(minScale, Math.min(maxScale, newScale));

    el.dataset.scale = String(newScale);
    applyTransformVars(el);
  }
  window.addEventListener("pointermove", onmove);
  window.addEventListener("pointerup", () => window.removeEventListener("pointermove", onmove), { once:true });
}

/* Flip */
function flip(el){
  const current = parseInt(el.dataset.flipX || "1", 10);
  el.dataset.flipX = String(current * -1);
  applyTransformVars(el);
}

/* =========================
   LIBRARY (lazy thumbs)
========================= */
let io = null;
function ensureObserver(){
  if (io) return;
  io = new IntersectionObserver((entries) => {
    for (const entry of entries){
      if (!entry.isIntersecting) continue;
      const img = entry.target;
      const src = img.getAttribute("data-src");
      if (src){
        img.src = src;
        img.removeAttribute("data-src");
      }
      io.unobserve(img);
    }
  }, { root: thumbGrid, rootMargin: "200px" });
}

function renderTabs(){
  tabsEl.innerHTML = "";
  for (const cat of CATEGORIES){
    const b = document.createElement("button");
    b.className = "tab" + (cat === activeCategory ? " active" : "");
    b.textContent = cat;
    b.onclick = () => { activeCategory = cat; renderTabs(); renderLibrary(); };
    tabsEl.appendChild(b);
  }
}

function renderLibrary(){
  ensureObserver();
  thumbGrid.innerHTML = "";

  const list = MINIATURES.filter(m => m.category === activeCategory);

  for (const m of list){
    const div = document.createElement("div");
    div.className = "thumb";
    div.title = m.name;

    const ph = document.createElement("div");
    ph.className = "ph";
    div.appendChild(ph);

    const img = document.createElement("img");
    img.alt = m.name;

    img.setAttribute("data-src", m.url);
    img.loading = "lazy";
    img.decoding = "async";
    img.fetchPriority = "low";

    img.onload = () => { if (ph.parentNode) ph.remove(); };
    img.onerror = () => { if (ph.parentNode) ph.remove(); };

    div.appendChild(img);
    div.addEventListener("click", () => place(m));

    thumbGrid.appendChild(div);
    io.observe(img);
  }
}

/* =========================
   CONTROLS
========================= */
tray.addEventListener("click", () => deselect());
frontBtn.onclick = () => { if (selected) selected.style.zIndex = (++zCounter); };
backBtn.onclick  = () => { if (selected) selected.style.zIndex = 1; };
deleteBtn.onclick= () => deleteSelected();
clearBtn.onclick = () => { tray.innerHTML = ""; deselect(); };

/* =========================
   EXPORT
========================= */
exportBtn.onclick = () => {
  if (typeof html2canvas !== "function"){
    alert("Save is still loading. Try again in a moment.");
    return;
  }
  html2canvas(tray).then(canvas => {
    const link = document.createElement("a");
    link.download = "sand-tray.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
};

const h2c = document.createElement("script");
h2c.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
document.body.appendChild(h2c);

/* =========================
   INIT
========================= */
setButtons(false);
renderTabs();
renderLibrary();
</script>
